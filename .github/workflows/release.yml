name: Release

env:
  SKILLSPECTOR_REF: cff7ecc4f2881d9e23ea4bb801a6353e1dbe39e6

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: "Dry run (no actual release)"
        required: false
        default: false
        type: boolean

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python for release verification
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install release verification dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y bats jq
          python3 -m pip install ruff==0.15.16 shellcheck-py==0.11.0.1
          python3 -m pip install "git+https://github.com/NVIDIA/SkillSpector.git@${SKILLSPECTOR_REF}"

      - name: Run release verification
        run: make -C kramme-cc-workflow verify

      - name: Run SkillSpector release scan
        env:
          SKILLSPECTOR_FAIL_ON: none
          SKILLSPECTOR_FORMAT: markdown
        run: |
          set -o pipefail
          SCAN_LOG="$RUNNER_TEMP/skillspector-release-scan.log"
          SUMMARY_FILE="$RUNNER_TEMP/skillspector-summary.md"

          make -C kramme-cc-workflow skill-security 2>&1 | tee "$SCAN_LOG"

          {
            echo "Static-only full-tree SkillSpector scan completed before release creation."
            echo
            sed -n '1,/^Skills: /p' "$SCAN_LOG"
            echo
            echo "Findings are advisory in this release gate; scanner setup and execution errors fail the workflow."
            echo "Full reports are attached as the \`skillspector-release-report\` workflow artifact."
          } > "$SUMMARY_FILE"

      - name: Upload SkillSpector report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: skillspector-release-report
          path: |
            ${{ runner.temp }}/skillspector
            ${{ runner.temp }}/skillspector-summary.md
          if-no-files-found: warn

      - name: Set up Python for release script
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run release script
        id: release
        run: |
          RELEASE_ARGS=("${{ inputs.version_type }}" --ci)
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            RELEASE_ARGS+=(--dry-run)
          fi
          python3 kramme-cc-workflow/scripts/release.py "${RELEASE_ARGS[@]}"
          VERSION=$(python3 -c "import json; print(json.load(open('kramme-cc-workflow/.claude-plugin/plugin.json'))['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.release.outputs.version }}"

          # Extract changelog section for this version
          CHANGELOG_SECTION=$(python3 -c "
          import re, sys
          version = sys.argv[1]
          content = open('kramme-cc-workflow/CHANGELOG.md').read()
          pattern = rf'## \[{re.escape(version)}\].*?(?=## \[|\Z)'
          match = re.search(pattern, content, re.DOTALL)
          print(match.group(0).strip() if match else '')
          " "$VERSION" 2>/dev/null || echo "")

          if [ -f "$RUNNER_TEMP/skillspector-summary.md" ]; then
            SKILLSPECTOR_SUMMARY=$(cat "$RUNNER_TEMP/skillspector-summary.md")
          else
            SKILLSPECTOR_SUMMARY="SkillSpector summary was not found. Check the workflow artifact for scan output."
          fi

          PR_BODY="$RUNNER_TEMP/release-pr-body.md"
          cat > "$PR_BODY" <<EOF
          ## Release v${VERSION}

          ${CHANGELOG_SECTION}

          ### SkillSpector release scan

          ${SKILLSPECTOR_SUMMARY}

          ---
          Automated release PR
          EOF

          # Create PR with changelog and SkillSpector evidence in body
          gh pr create \
            --title "chore: release v${VERSION}" \
            --body-file "$PR_BODY" \
            --base main \
            --head "release/v${VERSION}"
