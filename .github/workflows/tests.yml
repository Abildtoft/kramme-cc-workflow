name: Hook Tests

on:
  pull_request:

jobs:
  hooks:
    name: Run hook tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Node dependencies
        run: npm ci --no-audit --no-fund

      - name: Install BATS
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y bats jq
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install bats-core jq
          else
            echo "Unsupported runner OS: $RUNNER_OS"
            exit 1
          fi

      - name: Run tests
        run: make -C kramme-cc-workflow test

  hooks-required:
    name: Run hook tests
    runs-on: ubuntu-latest
    needs: hooks
    if: ${{ always() }}
    steps:
      - name: Check matrix hook tests
        run: |
          if [ "${{ needs.hooks.result }}" != "success" ]; then
            echo "Hook test matrix did not pass: ${{ needs.hooks.result }}"
            exit 1
          fi

  lint:
    name: Run static checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Node dependencies
        run: npm ci --no-audit --no-fund

      - name: Install static analysis tools
        run: python3 -m pip install -r requirements-dev.txt

      - name: Run static checks
        run: make -C kramme-cc-workflow lint format-check
