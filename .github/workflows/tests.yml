name: Hook Tests

on:
  pull_request:

jobs:
  hooks:
    name: Run hook tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node dependencies
        run: npm ci --no-audit --no-fund

      - name: Install BATS
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y bats jq
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install bats-core jq
          else
            echo "Unsupported runner OS: $RUNNER_OS"
            exit 1
          fi

      - name: Run tests
        run: make -C kramme-cc-workflow test

  hooks-required:
    name: Run hook tests
    runs-on: ubuntu-latest
    needs: hooks
    if: ${{ always() }}
    steps:
      - name: Check matrix hook tests
        run: |
          if [ "${{ needs.hooks.result }}" != "success" ]; then
            echo "Hook test matrix did not pass: ${{ needs.hooks.result }}"
            exit 1
          fi

  lint:
    name: Run static checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node dependencies
        run: npm ci --no-audit --no-fund

      - name: Install static analysis tools
        run: python3 -m pip install ruff==0.15.16 shellcheck-py==0.11.0.1

      - name: Run static checks
        run: make -C kramme-cc-workflow lint format-check
