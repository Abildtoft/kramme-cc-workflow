name: Skill Lint

on:
  pull_request:

jobs:
  skill-lint:
    name: Validate synced skill contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run skill contract lint
        run: python3 kramme-cc-workflow/scripts/lint-skill-contracts.py
