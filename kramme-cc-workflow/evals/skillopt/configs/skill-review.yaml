# Conservative SkillOpt pilot template for kramme:skill:review.
#
# The runner overrides env.skill_init, env.split_dir, and env.out_root with
# absolute local paths. Keep this file free of credentials and machine-specific
# paths.
model:
  backend: azure_openai
  optimizer: gpt-5.5
  target: gpt-5.5
  optimizer_backend: openai_chat
  target_backend: openai_chat
  reasoning_effort: medium
  rewrite_reasoning_effort: ""
  rewrite_max_completion_tokens: 64000

train:
  num_epochs: 1
  train_size: 0
  batch_size: 2
  accumulation: 1
  seed: 42

gradient:
  minibatch_size: 2
  merge_batch_size: 2
  analyst_workers: 1
  failure_only: true

optimizer:
  learning_rate: 2
  min_learning_rate: 1
  lr_scheduler: constant
  lr_control_mode: fixed
  skill_update_mode: patch
  use_slow_update: false
  slow_update_samples: 0
  slow_update_gate_with_selection: true
  longitudinal_pair_policy: mixed
  use_meta_skill: false

evaluation:
  use_gate: true
  gate_metric: hard
  sel_env_num: 0
  test_env_num: 0
  eval_test: true

env:
  name: kramme_skill_review
  skill_init: skills/kramme:skill:review/SKILL.md
  split_mode: split_dir
  split_dir: evals/skill-review/items
  out_root: .context/skillopt-runs/skill-review
  repo_eval_command: make -C kramme-cc-workflow skill-eval-skill-review

