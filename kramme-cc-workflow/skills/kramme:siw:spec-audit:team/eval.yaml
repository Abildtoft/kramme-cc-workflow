version: "1"

defaults:
  agent: claude
  provider: docker
  trials: 5
  timeout: 180
  threshold: 0.7
  docker:
    base: node:20-slim

tasks:
  - name: approach-check
    instruction: |
      You have a skill at skills/kramme:siw:spec-audit:team/SKILL.md.
      Read it and describe how you would audit a spec for quality.
      Write your plan to plan.txt.
    workspace:
      - src: SKILL.md
        dest: skills/kramme:siw:spec-audit:team/SKILL.md
    graders:
      - type: llm_rubric
        rubric: |
          The plan should mention using agent teams to run audit checks in
          parallel, evaluating spec completeness and clarity, and aggregating
          findings from multiple audit perspectives.
        weight: 1.0
