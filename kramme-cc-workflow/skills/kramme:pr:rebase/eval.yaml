version: "1"

defaults:
  agent: claude
  provider: docker
  trials: 5
  timeout: 180
  threshold: 0.7
  docker:
    base: node:20-slim

tasks:
  - name: approach-check
    instruction: |
      You have a skill at skills/kramme:pr:rebase/SKILL.md.
      Read it and describe how you would rebase the current branch.
      Write your plan to plan.txt.
    workspace:
      - src: SKILL.md
        dest: skills/kramme:pr:rebase/SKILL.md
    graders:
      - type: llm_rubric
        rubric: |
          The plan should mention detecting the base branch (e.g. main or
          develop), running the git rebase command, and force-pushing the
          rebased branch to the remote.
        weight: 1.0
