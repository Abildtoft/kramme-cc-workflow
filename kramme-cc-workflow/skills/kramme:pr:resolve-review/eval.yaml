version: "1"

defaults:
  agent: claude
  provider: docker
  trials: 5
  timeout: 180
  threshold: 0.7
  docker:
    base: node:20-slim

tasks:
  - name: approach-check
    instruction: |
      You have a skill at skills/kramme:pr:resolve-review/SKILL.md.
      Read it and describe how you would resolve code review feedback.
      Write your plan to plan.txt.
    workspace:
      - src: SKILL.md
        dest: skills/kramme:pr:resolve-review/SKILL.md
    graders:
      - type: llm_rubric
        rubric: |
          The plan should mention reading review findings or comments,
          implementing fixes for each piece of feedback, and only posting
          replies or resolving threads when auto/reply mode is enabled for an
          external review source.
        weight: 1.0
