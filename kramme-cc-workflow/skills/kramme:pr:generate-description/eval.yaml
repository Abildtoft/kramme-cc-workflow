version: "1"

defaults:
  agent: claude
  provider: docker
  trials: 5
  timeout: 180
  threshold: 0.7
  docker:
    base: node:20-slim

tasks:
  - name: approach-check
    instruction: |
      You have a skill at skills/kramme:pr:generate-description/SKILL.md.
      Read it and describe how you would generate a PR description.
      Write your plan to plan.txt.
    workspace:
      - src: SKILL.md
        dest: skills/kramme:pr:generate-description/SKILL.md
      - src: references/
        dest: skills/kramme:pr:generate-description/references/
    graders:
      - type: llm_rubric
        rubric: |
          The plan should mention analyzing the diff to understand code changes,
          analyzing commit history for context, and producing a structured
          description format (e.g. summary, changes, testing).
        weight: 1.0
