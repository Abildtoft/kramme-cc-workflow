version: "1"

defaults:
  agent: claude
  provider: docker
  trials: 5
  timeout: 180
  threshold: 0.7
  docker:
    base: node:20-slim

tasks:
  - name: approach-check
    instruction: |
      You have a skill at skills/kramme:pr:copy-review/SKILL.md.
      Read it and describe how you would review UI copy for redundancy.
      Write your plan to plan.txt.
    workspace:
      - src: SKILL.md
        dest: skills/kramme:pr:copy-review/SKILL.md
    graders:
      - type: llm_rubric
        rubric: |
          The plan should mention scanning labels, tooltips, and placeholders
          for redundant or inconsistent text, applying confidence thresholds
          to findings, and reporting actionable copy improvements.
        weight: 1.0
