version: "1"

defaults:
  agent: claude
  provider: docker
  trials: 5
  timeout: 180
  threshold: 0.7
  docker:
    base: node:20-slim

tasks:
  - name: approach-check
    instruction: |
      You have a skill at skills/kramme:nx:setup-portless/SKILL.md.
      Read it and describe how you would set up portless in an Nx workspace.
      Write your plan to plan.txt.
    workspace:
      - src: SKILL.md
        dest: skills/kramme:nx:setup-portless/SKILL.md
    graders:
      - type: llm_rubric
        rubric: |
          The plan should mention configuring a portless proxy for local
          development, setting up HTTPS, and updating dev targets in the
          Nx workspace configuration.
        weight: 1.0
