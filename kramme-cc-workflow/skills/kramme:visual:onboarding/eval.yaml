version: "1"

defaults:
  agent: claude
  provider: docker
  trials: 5
  timeout: 300
  threshold: 0.8
  docker:
    base: node:20-slim

tasks:
  - name: onboarding-guide-node-project
    instruction: |
      You have a skill called kramme:visual:onboarding in the skills/ directory.
      Read its SKILL.md and all referenced files (references/) and follow the
      skill's instructions.

      Also read the shared visual references at:
      - skills/kramme:visual:diagram/SKILL.md
      - skills/kramme:visual:diagram/references/
      - skills/kramme:visual:diagram/assets/

      Generate an interactive HTML onboarding guide for this project.
      The project source is in the project/ directory (package.json and src/index.ts).
      Save to output.html

      Do not open the file in a browser. Just write it to output.html.
    workspace:
      - src: SKILL.md
        dest: skills/kramme:visual:onboarding/SKILL.md
      - src: references/
        dest: skills/kramme:visual:onboarding/references/
      - src: ../kramme:visual:diagram/SKILL.md
        dest: skills/kramme:visual:diagram/SKILL.md
      - src: ../kramme:visual:diagram/references/
        dest: skills/kramme:visual:diagram/references/
      - src: ../kramme:visual:diagram/assets/
        dest: skills/kramme:visual:diagram/assets/
      - src: fixtures/package.json
        dest: project/package.json
      - src: fixtures/index.ts
        dest: project/src/index.ts
    graders:
      - type: deterministic
        run: bash graders/check.sh
        weight: 0.6
      - type: llm_rubric
        rubric: |
          HTML quality (0-0.3):
          - Is the output a well-formed, self-contained HTML page?
          - Does it include CSS styling with custom properties?
          - Does it use distinctive typography (Google Fonts)?
          Onboarding content (0-0.4):
          - Does it include a welcome/project identity section?
          - Does it describe the project architecture or structure?
          - Does it include getting started or setup information?
          - Does it reference the actual project files (package.json, index.ts)?
          Visual quality (0-0.3):
          - Does it have section navigation?
          - Is there visual hierarchy (hero sections, collapsible details)?
          - Does it feel like a "friendly textbook" aesthetic?
        weight: 0.4
