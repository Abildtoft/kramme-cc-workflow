version: "1"

defaults:
  agent: claude
  provider: docker
  trials: 5
  timeout: 300
  threshold: 0.8
  docker:
    base: node:20-slim

tasks:
  - name: plan-review-express-auth
    instruction: |
      You have a skill called kramme:visual:plan-review in the skills/ directory.
      Read its SKILL.md and follow the skill's instructions.

      Also read the shared visual references at:
      - skills/kramme:visual:diagram/SKILL.md
      - skills/kramme:visual:diagram/references/
      - skills/kramme:visual:diagram/assets/

      Generate a visual plan review for adding authentication to an Express API.
      Since there is no plan file available, create the review based on this plan:

      Plan: Add JWT authentication to an Express REST API
      - Add /auth/login and /auth/register endpoints
      - Create auth middleware that validates JWT tokens
      - Add bcrypt password hashing to User model
      - Protect all /tasks/* endpoints with auth middleware
      - Add refresh token rotation
      - Store refresh tokens in a new Redis cache layer

      Save to output.html

      Do not open the file in a browser. Just write it to output.html.
    workspace:
      - src: SKILL.md
        dest: skills/kramme:visual:plan-review/SKILL.md
      - src: ../kramme:visual:diagram/SKILL.md
        dest: skills/kramme:visual:diagram/SKILL.md
      - src: ../kramme:visual:diagram/references/
        dest: skills/kramme:visual:diagram/references/
      - src: ../kramme:visual:diagram/assets/
        dest: skills/kramme:visual:diagram/assets/
    graders:
      - type: deterministic
        run: bash graders/check.sh
        weight: 0.6
      - type: llm_rubric
        rubric: |
          HTML quality (0-0.3):
          - Is the output a well-formed, self-contained HTML page?
          - Does it include CSS styling with custom properties?
          - Does it use distinctive typography?
          Plan review content (0-0.4):
          - Does it include a plan summary section?
          - Does it show current vs. planned architecture?
          - Does it include a risk assessment or blast radius analysis?
          - Does it reference authentication, JWT, Express concepts?
          - Does it include a change-by-change breakdown?
          Visual quality (0-0.3):
          - Is there visual hierarchy with hero sections?
          - Does it use color to distinguish current vs. planned state?
          - Does it include section navigation or collapsible sections?
        weight: 0.4
