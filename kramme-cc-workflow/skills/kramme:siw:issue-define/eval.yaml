version: "1"

defaults:
  agent: claude
  provider: docker
  trials: 5
  timeout: 180
  threshold: 0.7
  docker:
    base: node:20-slim

tasks:
  - name: approach-check
    instruction: |
      You have a skill at skills/kramme:siw:issue-define/SKILL.md.
      Read it and describe how you would define an SIW issue.
      Write your plan to plan.txt.
    workspace:
      - src: SKILL.md
        dest: skills/kramme:siw:issue-define/SKILL.md
    graders:
      - type: llm_rubric
        rubric: |
          The plan should mention writing a clear problem statement with
          context, defining scope boundaries, and specifying acceptance
          criteria for the issue.
        weight: 1.0
