version: "1"

defaults:
  agent: claude
  provider: docker
  trials: 5
  timeout: 180
  threshold: 0.7
  docker:
    base: node:20-slim

tasks:
  - name: approach-check
    instruction: |
      You have a skill at skills/kramme:siw:resolve-audit/SKILL.md.
      Read it and describe how you would resolve audit findings.
      Write your plan to plan.txt.
    workspace:
      - src: SKILL.md
        dest: skills/kramme:siw:resolve-audit/SKILL.md
    graders:
      - type: llm_rubric
        rubric: |
          The plan should mention processing findings one at a time,
          considering alternatives for each finding, and creating issues
          for deferred items.
        weight: 1.0
