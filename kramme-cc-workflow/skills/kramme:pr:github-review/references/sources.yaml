sources:
  - id: github-cli-pr-commands
    url: https://cli.github.com/manual/gh_pr
    title: "GitHub CLI gh pr command reference"
    rationale: "The skill uses this source for listing review-requested PRs (gh pr list --search), reading PR context (gh pr view), and the gh CLI conventions used throughout the workflow."
    last_reviewed_at: 2026-07-01
    baseline_hash: "sha256:942dc20e453a203a438e45de88efc625e8b7a9ec6feb5ba2a556238a93c0ed0b"
  - id: github-search-review-requested
    url: https://docs.github.com/en/search-github/searching-on-github/searching-issues-and-pull-requests
    title: "GitHub search syntax for issues and pull requests"
    rationale: "The skill uses this source for the user-review-requested:@me search qualifier that surfaces PRs awaiting the user's direct review."
    last_reviewed_at: 2026-07-01
    baseline_hash: "sha256:f369d83f66b2711949c1cb7605939d49ee07d2c5927a419e41f90fa6646c47de"
  - id: github-rest-pull-reviews
    url: https://docs.github.com/en/rest/pulls/reviews
    title: "GitHub REST API endpoints for pull request reviews"
    rationale: "The skill uses this source for reading prior review verdicts and for the optional manual-posting appendix that submits a PR review with a body, event, and inline comments."
    last_reviewed_at: 2026-07-01
    baseline_hash: "sha256:f38e7c959a6e53b6547aa933702f38eacd69189e776ad8b062bab9da5b95b635"
  - id: github-rest-pull-review-comments
    url: https://docs.github.com/en/rest/pulls/comments
    title: "GitHub REST API endpoints for pull request review comments"
    rationale: "The skill uses this source for listing existing inline review comments and for the manual-posting appendix that replies to an existing review thread."
    last_reviewed_at: 2026-07-01
    baseline_hash: "sha256:861cb767042b0b43b251b9412caac42cdbe07e717091140d53c4fca30c70befe"
  - id: github-graphql-pull-review-threads
    url: https://docs.github.com/en/graphql/reference/pulls
    title: "GitHub GraphQL Pull requests reference"
    rationale: "The skill uses this source for reviewThreads metadata and resolution state when mapping an ongoing review conversation."
    last_reviewed_at: 2026-07-01
    baseline_hash: "sha256:d19e7b9140abf8e8665bf71624f490d0a41193a0c43b3a0e1e929a65aa5b8683"
  - id: github-rest-issue-comments
    url: https://docs.github.com/en/rest/issues/comments
    title: "GitHub REST API endpoints for issue comments"
    rationale: "The skill uses this source for listing the PR's general (non-inline) discussion comments when mapping an ongoing review conversation."
    last_reviewed_at: 2026-07-01
    baseline_hash: "sha256:43a10ab7f69c92557a8d4151fbd57b9ddccafd1e60e1e764de19bc9aa7a7c339"
