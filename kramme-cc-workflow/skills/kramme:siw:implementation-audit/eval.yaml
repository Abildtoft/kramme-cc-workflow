version: "1"

defaults:
  agent: claude
  provider: docker
  trials: 5
  timeout: 180
  threshold: 0.7
  docker:
    base: node:20-slim

tasks:
  - name: approach-check
    instruction: |
      You have a skill at skills/kramme:siw:implementation-audit/SKILL.md.
      Read it and describe how you would audit code against a spec.
      Write your plan to plan.txt.
    workspace:
      - src: SKILL.md
        dest: skills/kramme:siw:implementation-audit/SKILL.md
      - src: references/
        dest: skills/kramme:siw:implementation-audit/references/
    graders:
      - type: llm_rubric
        rubric: |
          The plan should mention detecting divergence between implementation
          and spec, identifying extensions or additions not in the spec, and
          checking section-by-section coverage of spec requirements.
        weight: 1.0
