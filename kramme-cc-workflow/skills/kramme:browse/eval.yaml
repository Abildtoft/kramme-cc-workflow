version: "1"

defaults:
  agent: claude
  provider: docker
  trials: 5
  timeout: 180
  threshold: 0.7
  docker:
    base: node:20-slim

tasks:
  - name: approach-check
    instruction: |
      You have a skill at skills/kramme:browse/SKILL.md.
      Read it and describe how you would navigate and screenshot a web app.
      Write your plan to plan.txt.
    workspace:
      - src: SKILL.md
        dest: skills/kramme:browse/SKILL.md
      - src: references/
        dest: skills/kramme:browse/references/
    graders:
      - type: llm_rubric
        rubric: |
          The plan should mention detecting available MCP servers or browser
          tools, selecting the appropriate browser tool for navigation, and
          taking screenshots of the relevant pages.
        weight: 1.0
