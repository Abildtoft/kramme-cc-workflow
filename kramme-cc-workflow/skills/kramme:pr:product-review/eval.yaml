version: "1"

defaults:
  agent: claude
  provider: docker
  trials: 5
  timeout: 180
  threshold: 0.7
  docker:
    base: node:20-slim

tasks:
  - name: approach-check
    instruction: |
      You have a skill at skills/kramme:pr:product-review/SKILL.md.
      Read it and describe how you would do a product review of a new dashboard feature.
      Write your plan to plan.txt.
    workspace:
      - src: SKILL.md
        dest: skills/kramme:pr:product-review/SKILL.md
    graders:
      - type: llm_rubric
        rubric: |
          The plan should mention evaluating user value or user impact,
          checking flow completeness (happy path and edge cases), and
          identifying missing states (empty, error, loading).
        weight: 1.0
