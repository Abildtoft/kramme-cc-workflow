version: "1"

defaults:
  agent: claude
  provider: docker
  trials: 5
  timeout: 180
  threshold: 0.7
  docker:
    base: node:20-slim

tasks:
  - name: approach-check
    instruction: |
      You have a skill at skills/kramme:siw:discovery/SKILL.md.
      Read it and describe how you would strengthen a spec through discovery.
      Write your plan to plan.txt.
    workspace:
      - src: SKILL.md
        dest: skills/kramme:siw:discovery/SKILL.md
    graders:
      - type: llm_rubric
        rubric: |
          The plan should mention identifying quality gaps in the existing
          spec, generating tradeoff questions or clarifying questions, and
          proposing spec improvements based on the findings.
        weight: 1.0
