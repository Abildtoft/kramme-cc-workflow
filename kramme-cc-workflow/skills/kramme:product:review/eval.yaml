version: "1"

defaults:
  agent: claude
  provider: docker
  trials: 5
  timeout: 180
  threshold: 0.7
  docker:
    base: node:20-slim

tasks:
  - name: approach-check
    instruction: |
      You have a skill at skills/kramme:product:review/SKILL.md.
      Read it and describe how you would review a live product's flows.
      Write your plan to plan.txt.
    workspace:
      - src: SKILL.md
        dest: skills/kramme:product:review/SKILL.md
      - src: references/
        dest: skills/kramme:product:review/references/
    graders:
      - type: llm_rubric
        rubric: |
          The plan should mention checking navigation coherence across the
          product, evaluating feature discoverability, and assessing
          consistency of patterns and interactions throughout the flows.
        weight: 1.0
