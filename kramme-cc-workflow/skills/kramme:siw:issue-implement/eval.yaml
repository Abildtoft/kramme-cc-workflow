version: "1"

defaults:
  agent: claude
  provider: docker
  trials: 5
  timeout: 180
  threshold: 0.7
  docker:
    base: node:20-slim

tasks:
  - name: approach-check
    instruction: |
      You have a skill at skills/kramme:siw:issue-implement/SKILL.md.
      Read it and describe how you would implement an SIW issue.
      Write your plan to plan.txt.
    workspace:
      - src: SKILL.md
        dest: skills/kramme:siw:issue-implement/SKILL.md
    graders:
      - type: llm_rubric
        rubric: |
          The plan should mention a planning phase before writing code,
          exploring the codebase to understand existing patterns, and mapping
          requirements from the issue to implementation tasks.
        weight: 1.0
