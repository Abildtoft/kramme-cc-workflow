    },
    {
      "name": "siw-tracker-status-vocabulary",
      "extract_regex": "(READY\\s*(?:\\||,)\\s*IN PROGRESS\\s*(?:\\||,)\\s*IN REVIEW\\s*(?:\\||,)\\s*DONE)",
